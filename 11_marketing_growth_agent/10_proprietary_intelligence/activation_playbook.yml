version: 1.0.0
lastUpdated: 2026-01-22
purpose: Step-by-step activation for classified intelligence layer

entryCriteria:
  - goals_defined
  - data_access_mapped
  - consent_documented
  - decision_owner_identified

phases:
  - id: PHASE-0
    name: Intake & Grounding
    duration: 1-3 days
    inputs: [business_model, icp, baseline_kpis, constraints]
    outputs: [client_context_sheet, baseline_snapshot, data_access_map]
    gate: if_missing_baseline_then_assumptions_and_data_qa

  - id: PHASE-1
    name: Signal Fusion & Trust Audit
    duration: 3-7 days
    uses: [sovereign_signal_fusion.json, trust_signal_ledger.json, risk_and_trust_shield.json]
    outputs: [signal_fusion_map, trust_scorecard, privacy_check]
    gate: require_causal_plan_if_confidence_below_L3

  - id: PHASE-2
    name: Offer Resonance & Archetype Mapping
    duration: 5-10 days
    uses: [offer_resonance_index.json, behavioral_archetype_graph.json, message_clarity_entropy.txt]
    outputs: [offer_score, archetype_map, message_clarity_checklist]
    gate: pause_scaling_if_offer_score_below_60

  - id: PHASE-3
    name: Creative Genome Seeding
    duration: 7-14 days
    uses: [creative_genome_engine.json, dark_pattern_firewall.json]
    outputs: [genome_library, variant_queue, ethical_clearance_log]
    gate: no_high_risk_claims_without_proof_score_0_8

  - id: PHASE-4
    name: Counterfactual & Incrementality Plan
    duration: 10-18 days
    uses: [counterfactual_growth_simulator.md, incrementality_testing_config.json]
    outputs: [counterfactual_baseline, incrementality_plan, decision_rules]
    gate: no_scale_without_L3_or_causal_validation

  - id: PHASE-5
    name: Demand Engineering
    duration: 12-21 days
    uses: [demand_engineering_system.md]
    outputs: [demand_narrative_brief, distribution_map, funnel_lift_targets]
    gate: revise_if_no_measurable_lift

  - id: PHASE-6
    name: Competitive Wargame & Moat Compounding
    duration: 14-24 days
    uses: [competitive_wargame_protocol.yml, moat_compounding_protocol.txt]
    outputs: [wargame_response_map, counter_messaging_library, moat_plan]

  - id: PHASE-7
    name: Activation & Guardrailed Scale
    duration: 18-30 days
    uses: [attention_yield_curve.json, risk_and_trust_shield.json]
    outputs: [live_dashboard, guardrail_log, scale_pause_decisions]
    gate: scale_only_if_confidence_L3_and_marginal_roi_ok

  - id: PHASE-8
    name: Learning Compounding
    duration: ongoing
    uses: [compound_learning_orchestrator.yml]
    outputs: [learning_digest, genome_updates, budget_recommendations]
