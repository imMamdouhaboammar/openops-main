name: Quality Gate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    name: 🛡️ Audit & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: 🚨 Lint Check
        run: npm run lint

      - name: 📘 Type Check
        run: npx tsc --noEmit

      - name: 🧪 Unit & Component Tests
        run: npm run test:unit

      - name: 📊 Verify Coverage
        run: npm run test:coverage
