# StrategIQ OS — System Configuration
# Version: 1.0.0
# Author: OpenOps Studio | Created by Mamdouh Aboammar

# ============================================
# SYSTEM IDENTIFICATION
# ============================================

system:
  name: "StrategIQ OS"
  version: "1.0.0"
  release_date: "2025-12-19"
  status: "production"
  environment: "operational"

# ============================================
# MARKET CONFIGURATION
# ============================================

market:
  primary_market: "Saudi Arabia"
  primary_language: "Arabic"
  secondary_language: "English"
  
  # Saudi Market Specialization
  specializations:
    - hajj_umrah_ecosystem
    - religious_tourism
    - vision_2030_alignment
    - saudi_cultural_context
    - ministry_partnerships
    - seasonal_campaigns
  
  # Target Sectors
  sectors:
    primary:
      - "Hajj & Umrah Services"
      - "Religious Tourism"
      - "Travel & Hospitality"
      - "Digital Platforms"
    
    secondary:
      - "Conference & Exhibitions"
      - "Government Initiatives"
      - "Brand Positioning"
      - "Growth Marketing"
  
  # Regulatory Compliance
  compliance:
    - saudi_data_regulations
    - cultural_sensitivity_guidelines
    - vision_2030_framework
    - ministry_of_hajj_standards

# ============================================
# MODULE CONFIGURATION
# ============================================

modules:
  
  # Competitive Research Engine (CRE)
  competitive_research_engine:
    module_id: "05_CRE"
    status: "active"
    version: "1.0.0"
    
    activation_triggers:
      - research_intent: "competitive"
      - scope_includes: "competitors"
      - decision_requires_evidence: true
      - growth_stage: ["market_expansion", "positioning_shift", "brand_audit"]
    
    capabilities:
      - deep_market_intelligence
      - competitor_analysis
      - opportunity_detection
      - evidence_based_reporting
    
    output_formats:
      - "json"
      - "pdf"
      - "markdown"
  
  # Clarity Thinking Framework
  clarity_thinking_framework:
    module_id: "06_CTF"
    status: "active"
    version: "1.0.0"
    
    activation_triggers:
      - decision_complexity: "high"
      - stakeholder_alignment_required: true
      - strategic_direction_needed: true
    
    capabilities:
      - core_question_identification
      - noise_reduction
      - strategic_truth_validation
      - clarity_optimization
    
    output_formats:
      - "strategic_brief"
      - "decision_blueprint"
      - "clarity_report"
  
  # Tactical Execution Engine
  tactical_execution_engine:
    module_id: "07_TEE"
    status: "active"
    version: "1.0.0"
    
    activation_triggers:
      - campaign_launch: true
      - performance_monitoring_required: true
      - optimization_needed: true
    
    capabilities:
      - performance_tracking
      - feedback_loop_management
      - strategic_learning
      - continuous_optimization
    
    metrics:
      - campaign_performance
      - conversion_rates
      - engagement_metrics
      - roi_analysis

# ============================================
# INTELLIGENCE CONFIGURATION
# ============================================

intelligence:
  
  # Multi-Agent Squad
  agent_squad:
    enabled: true
    expert_roles:
      - strategic_copywriter
      - growth_marketing_specialist
      - data_analyst
      - cultural_consultant
      - hajj_umrah_expert
      - digital_strategist
    
    coordination:
      mode: "collaborative"
      decision_style: "consensus_driven"
      expertise_rotation: true
  
  # Research Settings
  research:
    depth_level: "comprehensive"
    evidence_requirement: "high"
    source_diversity: "maximum"
    
    data_sources:
      - market_reports
      - competitor_websites
      - social_media_analytics
      - industry_publications
      - government_databases
      - customer_feedback
  
  # Learning System
  learning:
    enabled: true
    feedback_integration: "real_time"
    strategic_memory: "persistent"
    pattern_recognition: "active"

# ============================================
# OUTPUT CONFIGURATION
# ============================================

output:
  
  # Report Generation
  reports:
    default_format: "markdown"
    supported_formats:
      - markdown
      - json
      - pdf
      - html
    
    templates:
      - strategic_intelligence_report
      - competitive_analysis_report
      - campaign_performance_report
      - decision_recommendation_brief
    
    branding:
      author: "StrategIQ OS by OpenOps Studio"
      creator: "Mamdouh Aboammar"
      linkedin: "https://www.linkedin.com/in/mamdouh-aboammar"
  
  # Quality Standards
  quality:
    clarity_score_minimum: 8.0
    evidence_strength_minimum: "strong"
    cultural_appropriateness: "required"
    actionability: "high"

# ============================================
# PERFORMANCE CONFIGURATION
# ============================================

performance:
  
  # Processing
  processing:
    parallel_execution: true
    cache_enabled: true
    optimization_level: "high"
  
  # Metrics
  metrics:
    track_performance: true
    track_accuracy: true
    track_impact: true
    
    kpis:
      - decision_influence_score
      - strategic_clarity_rating
      - execution_success_rate
      - client_satisfaction_score

# ============================================
# INTEGRATION CONFIGURATION
# ============================================

integration:
  
  # Data Sources
  data_sources:
    apis:
      enabled: false
      endpoints: []
    
    databases:
      enabled: false
      connections: []
    
    files:
      enabled: true
      supported_formats:
        - json
        - yaml
        - markdown
        - csv
  
  # Export Targets
  export:
    destinations:
      - local_filesystem
      - cloud_storage
      - client_portal
    
    formats:
      - json
      - pdf
      - markdown
      - presentations

# ============================================
# SECURITY & PRIVACY
# ============================================

security:
  
  # Data Protection
  data_protection:
    encryption_at_rest: true
    encryption_in_transit: true
    anonymization: true
  
  # Compliance
  compliance:
    saudi_regulations: "enforced"
    data_retention_policy: "client_defined"
    privacy_controls: "strict"
  
  # Access Control
  access:
    authentication_required: true
    role_based_access: true
    audit_logging: true

# ============================================
# OPERATIONAL SETTINGS
# ============================================

operations:
  
  # Workflow
  workflow:
    automation_level: "high"
    human_review_required: true
    quality_gates: "enabled"
  
  # Monitoring
  monitoring:
    system_health: true
    performance_tracking: true
    error_logging: true
  
  # Maintenance
  maintenance:
    auto_updates: false
    backup_frequency: "daily"
    version_control: true

# ============================================
# LOCALIZATION
# ============================================

localization:
  
  # Language Support
  languages:
    primary: "ar"  # Arabic
    secondary: "en"  # English
    
  # Regional Settings
  regional:
    timezone: "Asia/Riyadh"
    calendar: "gregorian_hijri"
    currency: "SAR"
    date_format: "DD/MM/YYYY"
  
  # Cultural Context
  cultural:
    islamic_values: "respected"
    saudi_customs: "honored"
    sensitivity_checks: "enabled"

# ============================================
# DEVELOPMENT & TESTING
# ============================================

development:
  
  # Debug Mode
  debug:
    enabled: false
    log_level: "info"
    verbose_output: false
  
  # Testing
  testing:
    test_mode: false
    mock_data: false
    validation_strict: true

# ============================================
# CONTACT & ATTRIBUTION
# ============================================

attribution:
  creator: "Mamdouh Aboammar"
  studio: "OpenOps Studio"
  linkedin: "https://www.linkedin.com/in/mamdouh-aboammar"
  copyright: "© 2025 OpenOps Studio"
  license: "Proprietary"

# ============================================
# END OF CONFIGURATION
# ============================================
