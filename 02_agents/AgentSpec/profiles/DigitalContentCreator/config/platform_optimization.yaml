        optimization: "Create loop-worthy content"
      
      - factor: "Shares"
        weight: "High"
        optimization: "Relatable, shareable content"
      
      - factor: "Comments"
        weight: "Medium"
        optimization: "Ask questions, create debate"
      
      - factor: "Profile visits"
        weight: "Medium"
