      optimal_length: "7-15 seconds"
      aspect_ratio: "9:16"
      hook_timing: "First 1-3 seconds"
      captions: "Always add (80% watch muted)"
      music: "Use trending audio"
      hashtags: "3-5 in caption"
      posting_frequency: "3-5 per week"
      
    carousel:
      optimal_slides: "7-10 slides"
      first_slide: "Eye-catching hook"
      last_slide: "CTA or summary"
      swipe_cue: "Add visual indicator"
      text_amount: "Minimal, readable"
      posting_frequency: "2-3 per week"
    
    single_post:
      image_quality: "High resolution (1080x1080 min)"
      caption_length: "125-150 characters (optimal)"
      first_line: "Hook that doesn't get cut"
      hashtags: "20-30 (first comment or end)"
      posting_frequency: "1-2 per week"
    
    stories:
      optimal_count: "5-10 per day"
      interactive_elements: "Use polls, questions, quizzes"
      highlights: "Organize into categories"
      posting_times: "Throughout the day"
  
  hashtag_strategy:
    mix:
      - "30% high-volume (100K+ posts)"
      - "40% medium-volume (10K-100K posts)"
      - "30% low-volume (<10K posts)"
    
    egyptian_trending:
      - "#مصر #egypt"
      - "#القاهرة #cairo"
      - "#مصري #egyptian"
      - "#الاسكندرية #alexandria"
      - "#reelsinstagram"
      - "#explorepage"
    
    best_practices:
      - "Research trending hashtags weekly"
      - "Create branded hashtag"
      - "Use location tags"
      - "Avoid banned hashtags"
      - "Mix English and Arabic tags"
  
  engagement_tactics:
    - "Respond to comments within 1 hour"
    - "Ask questions in captions"
    - "Use CTAs (tag a friend, share, save)"
    - "Engage with followers' content"
    - "Use Instagram Live weekly"
    - "Share user-generated content"
    - "Create shareable templates"

