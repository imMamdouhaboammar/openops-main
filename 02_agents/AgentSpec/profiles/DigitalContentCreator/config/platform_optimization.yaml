# ==========================================

instagram:
  algorithm_insights:
    ranking_factors:
      - factor: "Engagement (likes, comments, shares, saves)"
        weight: "High"
        optimization: "Create save-worthy and shareable content"
      
      - factor: "Relationship"
        weight: "High"
        optimization: "Encourage DMs and consistent engagement"
      
      - factor: "Timeliness"
        weight: "Medium"
        optimization: "Post during peak hours"
      
      - factor: "Frequency"
        weight: "Medium"
        optimization: "Post consistently (1-2x daily)"
      
      - factor: "Time spent"
        weight: "High"
        optimization: "Create engaging Reels and carousels"
  
  content_format_best_practices:
