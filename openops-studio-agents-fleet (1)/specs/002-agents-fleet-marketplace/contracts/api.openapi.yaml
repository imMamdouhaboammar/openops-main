openapi: 3.0.3
info:
  title: OpenOps Agents Fleet Marketplace API
  version: 1.0.0
  description: REST API for e-commerce marketplace for AI Agent specifications
  contact:
    name: OpenOps Support
    url: https://openops.dev/support
  x-logo:
    url: https://openops.dev/logo.svg

servers:
  - url: https://api.openops.dev/v1
    description: Production
  - url: http://localhost:3000/api/v1
    description: Development

paths:
  /auth/signup:
    post:
      summary: Register a new user account
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - firstName
                - lastName
                - locale
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 12
                  pattern: '^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*])'
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                locale:
                  type: string
                  enum: [en, ar]
                role:
                  type: array
                  items:
                    type: string
                    enum: [buyer, vendor]
                  default: [buyer]
      responses:
        201:
          description: Account created; verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        400:
          description: Validation error (email already exists, weak password, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/verify-email:
    post:
      summary: Verify email address via token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  description: Email verification token (from email link)
      responses:
        200:
          description: Email verified; user can now log in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        400:
          description: Invalid or expired token

  /auth/login:
    post:
      summary: Authenticate user and receive session token
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/UserResponse'
                  token:
                    type: string
                    description: JWT bearer token (valid 7 days)
        401:
          description: Invalid credentials

  /listings:
    get:
      summary: Browse marketplace listings
      tags:
        - Listings
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Full-text search (title, description)
        - name: category
          in: query
          schema:
            type: string
            enum: [legal, sales, support, analytics, creative, other]
          description: Filter by category
        - name: compatibility
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [gemini, gpt, claude]
          description: Filter by platform compatibility
        - name: minPrice
          in: query
          schema:
            type: integer
            description: Min price in cents (e.g., 2999 = $29.99)
        - name: maxPrice
          in: query
          schema:
            type: integer
        - name: tier
          in: query
          schema:
            type: string
            enum: [free, personal, team, enterprise]
        - name: sort
          in: query
          schema:
            type: string
            enum: [recent, popular, rating, price_asc, price_desc]
          default: recent
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 10
            maximum: 100
            default: 20
      responses:
        200:
          description: List of marketplace listings
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ListingResponse'
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      pages:
                        type: integer

    post:
      summary: Create a new marketplace listing (vendor only)
      tags:
        - Listings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListingRequest'
      responses:
        201:
          description: Listing created (status = draft)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        400:
          description: Validation error
        401:
          description: Unauthorized (not a vendor)

  /listings/{id}:
    get:
      summary: Get listing details
      tags:
        - Listings
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Listing details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingDetailResponse'
        404:
          description: Listing not found

    patch:
      summary: Update listing (vendor owner only)
      tags:
        - Listings
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListingRequest'
      responses:
        200:
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListingResponse'
        403:
          description: Not authorized to modify this listing
        404:
          description: Listing not found

  /orders:
    post:
      summary: Create an order (checkout)
      tags:
        - Orders
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        201:
          description: Order created; awaiting payment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        400:
          description: Validation error (listing unavailable, price mismatch, etc.)
        401:
          description: Unauthorized (not authenticated)
        422:
          description: Order failed (e.g., license seat limit exceeded)

    get:
      summary: Get buyer's order history
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: Paginated order history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/OrderResponse'
                  pagination:
                    type: object

  /orders/{id}:
    get:
      summary: Get order details
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Order details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderDetailResponse'
        403:
          description: Not authorized to view this order
        404:
          description: Order not found

  /orders/{id}/download:
    post:
      summary: Request a download link for a purchased package
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                clientVersion:
                  type: string
                  description: Semantic version of buyer's client (for compatibility tracking)
      responses:
        200:
          description: Download link issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  downloadUrl:
                    type: string
                    format: uri
                    description: Signed, time-bound download URL (valid 24h)
                  checksum:
                    type: string
                    description: SHA-256 of archive (for client verification)
                  checksumAlgorithm:
                    type: string
                    default: sha256
                  expiresAt:
                    type: string
                    format: date-time
        400:
          description: Order not captured / link already generated and active
        403:
          description: Not authorized
        404:
          description: Order not found

  /orders/{id}/refund:
    post:
      summary: Request refund for an order
      tags:
        - Orders
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  enum: [not_as_described, missing_files, incompatible, other]
                  description: Reason for refund
                details:
                  type: string
                  maxLength: 500
                  description: Additional details (if reason = other)
                artifacts:
                  type: array
                  items:
                    type: string
                  description: Specific artifacts with issues (optional)
      responses:
        200:
          description: Refund processed or requested for manual review
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [auto_approved, pending_review, rejected]
                  refundId:
                    type: string
                    format: uuid
                  reason:
                    type: string
                  nextSteps:
                    type: string
        400:
          description: Refund window closed or checksum already verified
        403:
          description: Not authorized
        404:
          description: Order not found

  /vendors/upload-package:
    post:
      summary: Upload an agent package archive (vendor only)
      tags:
        - Vendors
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - archive
                - name
                - version
                - compatibility
              properties:
                archive:
                  type: string
                  format: binary
                  description: ZIP archive (< 100MB)
                name:
                  type: string
                  maxLength: 100
                version:
                  type: string
                  pattern: '^\d+\.\d+\.\d+(-[a-zA-Z0-9]+)?$'
                  description: Semantic version
                compatibility:
                  type: array
                  items:
                    type: string
                    enum: [gemini, gpt, claude]
                  minItems: 1
                category:
                  type: string
                  enum: [legal, sales, support, analytics, creative, other]
                description:
                  type: string
                  maxLength: 1000
      responses:
        201:
          description: Package uploaded and validated
          content:
            application/json:
              schema:
                type: object
                properties:
                  packageId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [validating, active, rejected]
                  artifacts:
                    type: array
                    items:
                      type: string
                  checksum:
                    type: string
                    description: SHA-256 hex
        400:
          description: Validation error (invalid archive, missing artifacts, etc.)
        413:
          description: Archive too large (> 100MB)
        401:
          description: Unauthorized (not a vendor)

  /vendors/kyc-status:
    get:
      summary: Get vendor KYC verification status
      tags:
        - Vendors
      security:
        - BearerAuth: []
      responses:
        200:
          description: KYC status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [pending, verified, rejected]
                  verifiedAt:
                    type: string
                    format: date-time
                    nullable: true
                  nextSteps:
                    type: string
                    nullable: true
        401:
          description: Unauthorized

components:
  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        locale:
          type: string
          enum: [en, ar]
        roles:
          type: array
          items:
            type: string
            enum: [buyer, vendor, admin]
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    ListingResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        price:
          type: integer
          description: Price in cents (USD base)
        currency:
          type: string
          enum: [usd, eur, sar, aed]
        category:
          type: string
        compatibilityTags:
          type: array
          items:
            type: string
        rating:
          type: number
          minimum: 0
          maximum: 5
          nullable: true
        ratingCount:
          type: integer
          default: 0
        downloadCount:
          type: integer
        featuredImage:
          type: string
          format: uri
          nullable: true
        status:
          type: string
          enum: [draft, pending_review, active, paused, archived]
        publishedAt:
          type: string
          format: date-time
          nullable: true

    ListingDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ListingResponse'
        - type: object
          properties:
            description:
              type: string
              maxLength: 5000
            packageId:
              type: string
              format: uuid
            vendorId:
              type: string
              format: uuid
            version:
              type: string
              description: Current package version
            artifacts:
              type: array
              items:
                type: string
            license:
              type: object
              properties:
                tier:
                  type: string
                  enum: [free, personal, team, enterprise]
                durationDays:
                  type: integer
                  nullable: true
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/ReviewResponse'

    CreateListingRequest:
      type: object
      required:
        - packageId
        - title
        - price
        - tier
      properties:
        packageId:
          type: string
          format: uuid
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        price:
          type: integer
          minimum: 0
          description: Price in cents
        currency:
          type: string
          enum: [usd, eur, sar, aed]
          default: usd
        tier:
          type: string
          enum: [free, personal, team, enterprise]
        tags:
          type: array
          items:
            type: string
          maxItems: 10
        featuredImage:
          type: string
          format: uri
          nullable: true

    UpdateListingRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 100
        description:
          type: string
          maxLength: 5000
        price:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [draft, pending_review, active, paused, archived]
        discount:
          type: object
          properties:
            percent:
              type: integer
              minimum: 0
              maximum: 100
            validUntil:
              type: string
              format: date-time
          nullable: true

    CreateOrderRequest:
      type: object
      required:
        - listingId
        - licenseTierId
      properties:
        listingId:
          type: string
          format: uuid
        licenseTierId:
          type: string
          format: uuid
        licenseSeats:
          type: integer
          minimum: 1
          description: Required for team/enterprise tiers

    OrderResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        listingId:
          type: string
          format: uuid
        priceUsd:
          type: integer
          description: Final price in cents
        currency:
          type: string
        status:
          type: string
          enum: [pending, captured, failed, refunded, chargedback]
        createdAt:
          type: string
          format: date-time
        capturedAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time

    OrderDetailResponse:
      allOf:
        - $ref: '#/components/schemas/OrderResponse'
        - type: object
          properties:
            packageVersion:
              type: string
            licenseTier:
              type: string
            licenseExpiresAt:
              type: string
              format: date-time
              nullable: true
            downloadCount:
              type: integer
            checkedChecksum:
              type: boolean

    ReviewResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        reviewText:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: User-facing error message
        details:
          type: object
          description: Additional error context (e.g., validation failures)
          nullable: true

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token (valid 7 days)

tags:
  - name: Auth
    description: User authentication and account management
  - name: Listings
    description: Marketplace listings (browse, create, update)
  - name: Orders
    description: Purchase orders and downloads
  - name: Vendors
    description: Vendor onboarding and package management
