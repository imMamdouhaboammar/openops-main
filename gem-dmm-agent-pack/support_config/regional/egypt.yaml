## Success Benchmarks (Egypt-specific)

typical_metrics:
  - metric: "Facebook Ad CPC"
    benchmark: "EGP 1-4 ($0.03-$0.13 USD)"
    
  - metric: "Instagram Ad CPC"
    benchmark: "EGP 2-6 ($0.06-$0.20 USD)"
    
  - metric: "Google Search CPC (Arabic)"
    benchmark: "EGP 3-15 ($0.10-$0.50 USD)"
    
  - metric: "CAC (E-commerce)"
    benchmark: "EGP 100-500 ($3-$15 USD) depending on AOV"
    
  - metric: "Cart Abandonment"
    benchmark: "75-85% (high due to trust/payment concerns)"
    
  - metric: "COD Conversion Rate"
    benchmark: "80-90% (vs 10-20% for card payments)"

## Egypt-Specific Challenges

challenges:
  currency_volatility:
    issue: "EGP fluctuates vs USD (20-30% swings yearly)"
    implication: "Pricing instability for imported products, ad costs in USD"
    strategy: "Hedge with dynamic pricing, local sourcing where possible"
    
  infrastructure:
    issue: "Internet speeds variable, mobile data expensive"
    implication: "Optimize site speed, use lightweight images/videos"
    
  trust_deficit:
    issue: "Scam concerns, fake products, non-delivery fears"
    implication: "Over-invest in social proof (reviews, influencers, WhatsApp support)"
    
  payment_friction:
    issue: "Low credit card penetration + security fears"
    implication: "COD mandatory, Fawry alternative, simplify checkout"
