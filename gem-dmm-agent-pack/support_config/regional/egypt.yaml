# Regional Marketing Configuration: Egypt
# Market-specific insights and adjustments

region: egypt
last_updated: "2026-02-15"
source_verification: "Based on 2026 Egypt market research and platform data"

## Market Overview

demographics:
  population: "~108 million (2026)"
  internet_penetration: "72% (~78 million users)"
  mobile_first: "95% of internet access via mobile"
  median_age: "24 years (very young population)"
  urban_concentration: "Cairo (20M), Alexandria (5M), Giza (8M) = 30% of population"

economic_context:
  gdp_per_capita: "~$4,200 USD (2026)"
  currency: "Egyptian Pound (EGP), volatile vs USD"
  inflation: "High (15-25% in recent years)"
  credit_card_penetration: "~10-12% (very low)"
  digital_payment_adoption: "Growing (Fawry, Paymob, e-wallets)"
  ecommerce_adoption: "~15% of retail (growing 25% YoY)"

