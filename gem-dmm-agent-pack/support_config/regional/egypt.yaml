    marketing_fit: "Low priority unless news/media brand"
    
  snapchat:
    penetration: "~3M users (much lower than GCC)"
    marketing_fit: "Not recommended vs Facebook/Instagram"

search_behavior:
  google:
    dominance: "~95% search market share"
    query_language: "Mix of Arabic (60%) and English (40%)"
    high_intent_keywords: "Arabic queries for local services, English for tech/SaaS"
    
  youtube_as_search:
    trend: "Egyptians use YouTube to search 'how to' and product reviews"
    opportunity: "Video SEO critical (Arabic tutorials, unboxing, comparisons)"

## Payment & Commerce Behaviors

payment_methods:
  cod_cash_on_delivery:
    usage: "70-80% of all e-commerce transactions"
    psychology: "Trust issue - 'I'll pay when I see the product'"
    implication: "E-commerce MUST offer COD or fail"
    challenge: "High return rates (10-15%), cash handling logistics"
    
  credit_debit_cards:
    usage: "10-15% of e-commerce (limited penetration)"
    psychology: "Security concerns, fraud fears"
    
  fawry:
    usage: "10-15% of online payments"
    mechanism: "Pay at Fawry kiosks (25K+ locations nationwide)"
    psychology: "Trust + convenience (no card needed)"
    implication: "Must integrate Fawry for online payments"
    
  mobile_wallets:
    usage: "5-10% (growing - Vodafone Cash, Orange Cash, etisalat Cash)"
    trend: "Increasing among urban youth and mobile-first users"

buyer_psychology_egypt:
  trust_barriers:
    - "High skepticism of online businesses (scam concerns)"
    - "Preference for established brands or social proof (reviews, influencer endorsements)"
    - "Need for human touchpoint (WhatsApp chat before purchase)"
  
  price_sensitivity:
    - "VERY high - Egyptians compare prices obsessively"
    - "Discounts and promotions drive decisions (Ramadan sales, Black Friday)"
    - "Free shipping threshold critical (typical: EGP 500+)"
  
  relationship_focus:
    - "Personal connection matters - answer on WhatsApp quickly"
    - "Egyptians prefer buying from 'people they know' (friends, influencers, trusted sellers)"

## Channel Strategy for Egypt

recommended_channel_prioritization:
  tier_1_must_have:
    - "Facebook Ads (broad reach, all demographics)"
    - "WhatsApp Business (customer communication, order confirmation)"
    - "COD payment option (e-commerce survival requirement)"
    
  tier_2_growth:
    - "Instagram Ads (younger, urban, higher income)"
    - "Google Search Ads (intent-based, Arabic keywords)"
    - "Influencer marketing (trust-building)"
    
  tier_3_scale:
    - "TikTok Ads (if targeting Gen Z)"
    - "YouTube Ads (video content)"
    - "Fawry integration (non-COD payment option)"

avoid_low_roi:
  - "LinkedIn Ads (unless B2B enterprise targeting MNCs)"
  - "Snapchat Ads (low penetration vs GCC)"
  - "Twitter/X Ads (declining user base)"

## Seasonal Marketing Calendar

key_periods:
  ramadan:
    timing: "March 10 - April 8, 2026 (dates vary yearly)"
    significance: "BIGGEST sales period - 40% of annual revenue for many businesses"
    behavior: "Late-night shopping (post-iftar 9PM-2AM), family purchases, big-ticket items"
    strategy: "Heavy ad spend (30-40% of annual budget), family bundles, Ramadan-themed creative"
    creative_notes: "Emotional storytelling, family values, generosity themes"
    
  eid_al_fitr:
    timing: "April 9-11, 2026"
    significance: "Gift-giving, clothing, sweets"
    strategy: "Flash sales, limited-time offers, next-day delivery promises"
    
  back_to_school:
    timing: "September"
    significance: "Uniforms, stationery, electronics for students"
    target: "Parents (age 30-50), middle-class"
    
  black_friday:
    timing: "November 29, 2026"
    significance: "Growing adoption (e-commerce spike)"
    strategy: "Doorbuster deals, countdown timers, influencer partnerships"
    note: "Not as big as Ramadan but growing"
    
  christmas_new_year:
    timing: "December 24-31"
    significance: "Christian minority (~10%) + secular celebrations"
    strategy: "Target urban, higher-income segments"

## Regional Messaging & Creative

language_preferences:
  arabic_egyptian_dialect:
    usage: "Conversational ads, social media captions, WhatsApp"
    psychology: "Relatable, authentic, friendly"
    
  modern_standard_arabic:
    usage: "Formal content, website copy, professional B2B"
    psychology: "Trustworthy, professional"
    
  english:
    usage: "Tech products, SaaS, premium brands"
    target: "Educated, urban, higher income (20-30% of market)"

creative_best_practices:
  - "Use Egyptian influencers and celebrities (trust signals)"
  - "Show real people (UGC) vs stock photos (trust issue)"
  - "Highlight 'free delivery' and 'COD available' prominently"
  - "Use countdown timers and scarcity ('limited stock', 'sale ends soon')"
  - "Ramadan creative: Family, togetherness, generosity themes"

## Logistics & Fulfillment

shipping_landscape:
  trusted_couriers: ["Bosta", "Aramex", "DHL", "Fedex (premium)"]
  egypt_post: "Unreliable - avoid for e-commerce"
  delivery_expectations: "2-5 days (Cairo/Alex), 5-7 days (Upper Egypt)"
  free_shipping_threshold: "EGP 500-1000 (depending on margin)"

cod_best_practices:
  - "Implement phone confirmation (WhatsApp) to reduce fake orders"
  - "Charge EGP 20-30 COD fee (optional, to offset logistics cost)"
  - "Accept returns gracefully (build trust for repeat purchases)"

