    usage: "Visual content, influencer marketing, shopping"
    marketing_fit: "Fashion, beauty, F&B, lifestyle"
    
  tiktok:
    penetration: "12M users (fast growth)"
    demographics: "Gen Z (16-28)"
    usage: "Entertainment, trends, viral content"
    marketing_fit: "Trendy products, youth-oriented brands"
    
  whatsapp:
    penetration: "~70M users (CRITICAL)"
    usage: "PRIMARY communication channel (personal + business)"
    marketing_fit: "Customer support, order confirmation, abandoned cart recovery"
