## GCC-Specific Opportunities

unique_advantages:
  high_purchasing_power:
    - "Premium products perform well - don't race to bottom on price"
    - "High AOV ($100-500+ common for fashion, electronics)"
    
  digital_native_youth:
    - "60% under 30 - early adopters of new platforms/trends"
    - "TikTok Shop, Instagram Shopping, social commerce growing"
    
  influencer_ecosystem:
    - "Mature influencer market - clear ROI from influencer partnerships"
    - "Micro-influencers (10K-100K followers) cost-effective vs mega-influencers"
    
  logistics_infrastructure:
    - "World-class logistics (UAE/Saudi)"
    - "Same-day delivery possible in Dubai, Riyadh"

## GCC-Specific Challenges

challenges:
  market_fragmentation:
    issue: "6 different countries, different cultures, platforms, regulations"
    strategy: "Segment by country - don't treat GCC as monolith"
    
  local_vs_expat:
    issue: "UAE is 90% expat (different needs vs nationals)"
    strategy: "Separate campaigns: Arabic (nationals) vs English (expats)"
    
  premium_expectations:
    issue: "High service expectations - complaints go viral"
    strategy: "Over-invest in customer service, respond quickly on social"
    
  data_residency:
    issue: "Saudi PDPL requires data localization for certain sectors"
    strategy: "For B2B SaaS, mention compliance early in sales process"
