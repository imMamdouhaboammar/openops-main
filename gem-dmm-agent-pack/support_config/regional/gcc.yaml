## Platform Preferences & Usage

social_media_landscape:
  snapchat:
    penetration: "#1 in Saudi Arabia - 26M users (75% of pop!)"
    demographics: "Dominant among under-35 (daily use)"
    usage: "Primary social platform (vs Instagram/Facebook in other markets)"
    marketing_fit: "CRITICAL for Saudi market - fashion, beauty, F&B, automotive"
    creative_notes: "Vertical video (9:16), AR lenses popular, influencer-driven"
    
  instagram:
    penetration: "High across GCC (~50% of pop)"
    demographics: "25-45, affluent, fashion-conscious"
    usage: "Visual discovery, luxury brands, influencer culture"
    marketing_fit: "Premium products, fashion, travel, hospitality"
    
  tiktok:
    penetration: "Growing rapidly (especially UAE, Saudi youth)"
    demographics: "Gen Z (16-28)"
    usage: "Entertainment, viral trends, e-commerce discovery"
    marketing_fit: "Trendy products, youth brands"
    
  twitter_x:
    penetration: "Higher than Egypt (~30% in Saudi/UAE)"
    usage: "News, politics, sports, public discourse"
    marketing_fit: "Real-time marketing, events, brand announcements"
    
  whatsapp:
    penetration: "90%+ (CRITICAL)"
    usage: "Primary communication (personal + business)"
    marketing_fit: "Customer support, appointment confirmations, transactional messages"
    note: "WhatsApp Business essential for service industries"
    
  facebook:
    penetration: "Moderate (declining among youth, strong among expats 30+)"
    usage: "Groups, marketplace, expat communities"
    marketing_fit: "Expat targeting, B2B, older demographics"
    
  linkedin:
    penetration: "~12M users (strong B2B)"
    usage: "Professional networking, B2B marketing"
    marketing_fit: "B2B services, recruitment, enterprise SaaS"

search_behavior:
  google:
    dominance: "~95% search share"
    query_language: "60% Arabic, 40% English (higher English than Egypt)"
    high_intent_keywords: "Luxury, premium, service-oriented queries"

## Payment & Commerce Behaviors

payment_methods:
  credit_debit_cards:
    usage: "60-70% of online transactions"
    psychology: "Trust in digital payments, established banking"
    
  apple_pay_samsung_pay:
    usage: "30-40% (growing, especially UAE)"
    psychology: "Tech-savvy, convenience-focused"
    
  cod_cash_on_delivery:
    usage: "20-30% (much lower than Egypt)"
    psychology: "Less trust issue, but still preferred by some"
    note: "Declining trend, especially in UAE"
    
  bank_transfer:
    usage: "B2B common, B2C rare"
    
  tabby_tamara_bnpl:
    usage: "10-15% (buy now, pay later - growing)"
    psychology: "Manage cash flow, especially for high-ticket items"
    trend: "Very popular among millennials/Gen Z"

buyer_psychology_gcc:
  premium_positioning:
    - "GCC buyers associate price with quality ('cheap = low quality')"
    - "Don't compete on price - emphasize quality, exclusivity, service"
    
  relationship_culture:
    - "B2B decisions are VERY relationship-heavy (personal connections matter)"
    - "Face-to-face meetings preferred for high-ticket sales"
    - "Patience required - building trust takes time but pays off"
    
  national_vs_expat:
    - "Saudi nationals: Conservative values, family-oriented, Arabic language preference"
    - "Expats (UAE especially): Western-influenced, English preferred, diverse tastes"
    - "CRITICAL: Segment messaging by national vs expat (different motivations)"
    
  influencer_trust:
    - "GCC has VERY strong influencer culture (trust > traditional ads)"
    - "Micro-celebrities drive purchasing decisions (fashion, beauty, F&B)"
    
  service_expectations:
    - "High expectations - premium service, fast responses, white-glove treatment"
    - "Next-day delivery is standard (not a differentiator)"
    - "Easy returns expected (no questions asked)"

## Channel Strategy for GCC

recommended_channel_prioritization:
  tier_1_must_have_saudi:
    - "Snapchat Ads (75% daily use in Saudi)"
    - "Instagram Ads (premium positioning)"
    - "WhatsApp Business (customer communication)"
    - "Influencer marketing (trust-building)"
    
  tier_1_must_have_uae:
    - "Instagram Ads (visual, expat-heavy)"
    - "Google Search Ads (high intent, English + Arabic)"
    - "TikTok Ads (growing, youth market)"
    - "LinkedIn Ads (B2B, expat professionals)"
    
  tier_2_growth:
    - "YouTube Ads (video content, product reviews)"
    - "Twitter/X (real-time, events, announcements)"
    - "Programmatic Display (retargeting)"
    
  tier_3_scale:
    - "Out-of-home (billboards in Dubai/Riyadh - high visibility)"
    - "Events & sponsorships (relationship-building)"
    - "Affiliate marketing"

avoid_low_roi:
  - "Facebook Ads (declining youth engagement, use for expats 30+ only)"
  - "Generic content marketing (GCC buyers prefer visual, video, influencer content)"

## Seasonal Marketing Calendar

key_periods:
  ramadan:
    timing: "March 10 - April 8, 2026"
    significance: "BIGGEST sales period - 40-50% of annual revenue"
    behavior: "Evening shopping (post-iftar), family purchases, charity focus"
    strategy: "Premium iftar/suhoor themes, family bundles, limited editions"
    creative_notes: "Emotional, family values, generosity, community"
    budget_allocation: "35-45% of annual ad spend"
    
  eid_al_fitr:
    timing: "April 9-11, 2026"
    significance: "Gift-giving, fashion, gold jewelry, travel"
    strategy: "Luxury positioning, gift sets, premium packaging"
    
  eid_al_adha:
    timing: "June 15-18, 2026"
    significance: "Family gatherings, travel, home goods"
    strategy: "Family-oriented, travel packages, home upgrades"
    
  saudi_national_day:
    timing: "September 23"
    significance: "Saudi-specific - patriotic celebrations, green theme"
    strategy: "Saudi-themed creative, national pride messaging"
    
  uae_national_day:
    timing: "December 2"
    significance: "UAE-specific - flag colors, national pride"
    strategy: "UAE-themed creative, loyalty to country"
    
  riyadh_season_dubai_shopping_festival:
    timing: "Nov-Feb (Riyadh Season), Dec-Jan (DSF)"
    significance: "Entertainment, shopping, tourism"
    strategy: "Tourism packages, event sponsorships, experiential marketing"

## Regional Messaging & Creative

language_preferences:
  arabic_gcc_dialect:
    usage: "Social media, influencer content, Saudi national targeting"
    psychology: "Relatable, culturally appropriate"
    
  modern_standard_arabic:
    usage: "Formal content, government/B2B, pan-GCC campaigns"
    psychology: "Professional, respectful"
    
  english:
    usage: "Expat targeting (UAE ~90% expat), tech/SaaS, global brands"
    target: "Expats, English-educated nationals, B2B"

creative_best_practices:
  - "Use GCC influencers (high trust, strong parasocial relationships)"
  - "Premium aesthetics - avoid 'cheap' looking creative"
  - "Show aspirational lifestyle (luxury, success, family)"
  - "Cultural sensitivity - avoid mixed-gender imagery in Saudi (conservative values)"
  - "Ramadan creative: Family, charity, spirituality (very important)"
  - "Vertical video for Snapchat (9:16 aspect ratio)"

cultural_sensitivities:
  - "Saudi Arabia: More conservative - modesty in imagery, family values"
  - "UAE: More liberal (especially Dubai) - Western-style creative acceptable"
  - "Avoid alcohol, pork imagery across all GCC markets"
  - "Ramadan: No eating/drinking imagery during daylight hours"

