demographics:
  population: "~10 million (2026)"
  nationals_vs_expats: "~10% Emirati nationals, 90% expats"
  expat_breakdown: "Indian (27%), Pakistani (12%), Bangladeshi (7%), Filipino (5%), Egyptian (5%), Western (5%), Other (39%)"
  median_age: "33 years"
  urbanization: "Dubai (3.5M), Abu Dhabi (1.5M), Sharjah (1.5M)"
  internet_penetration: "99% (highest globally)"
  
economic_context:
  gdp_per_capita: "~$48,000 USD (very high)"
