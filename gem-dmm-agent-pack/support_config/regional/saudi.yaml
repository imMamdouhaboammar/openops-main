## Saudi-Specific Challenges

challenges:
  cultural_sensitivity:
    issue: "More conservative than UAE - content must be culturally appropriate"
    strategy: "Review all creative with local Saudi team. Avoid mixed-gender imagery."
    
  arabic_language_preference:
    issue: "Saudis prefer Arabic content (vs English in UAE)"
    strategy: "Prioritize Arabic creative, Arabic influencers, Arabic customer support"
    
  regional_differences:
    issue: "Riyadh (conservative) vs Jeddah (more liberal) - different tones work"
    strategy: "Segment campaigns by city if budget allows"
    
  regulatory_compliance:
    issue: "Government approval required for certain sectors (healthcare, finance)"
    strategy: "Work with local legal counsel. Allow 2-4 weeks for approvals."
