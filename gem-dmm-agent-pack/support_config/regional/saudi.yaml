## Platform Preferences & Usage (Saudi-Specific)

social_media_landscape:
  snapchat:
    penetration: "26M users (75% of population!) - #1 platform"
    demographics: "Dominant among under-35 (daily use 90%+)"
    usage: "PRIMARY social platform (vs Instagram/Facebook elsewhere)"
    marketing_fit: "CRITICAL for fashion, beauty, F&B, automotive, retail"
    creative_notes: "Vertical video (9:16), AR lenses very popular, influencer-driven"
    cultural_note: "More conservative content than UAE - modesty required"
    
  twitter_x:
    penetration: "~12M users (higher than other GCC countries)"
    usage: "News, politics, sports, public discourse"
    marketing_fit: "Real-time marketing, events, brand announcements"
    note: "Saudis are very active on Twitter - trending topics drive conversations"
    
  instagram:
    penetration: "~18M users"
    demographics: "25-45, affluent, fashion-conscious"
    usage: "Visual discovery, luxury brands, influencer culture"
    marketing_fit: "Premium products, fashion, travel"
    
  tiktok:
    penetration: "~8M users (growing rapidly among Gen Z)"
    demographics: "16-28"
    usage: "Entertainment, viral trends, e-commerce discovery"
    marketing_fit: "Youth brands, trendy products"
    note: "More conservative content than global TikTok"
    
  whatsapp:
    penetration: "95%+ (CRITICAL)"
    usage: "Primary communication (personal + business)"
    marketing_fit: "Customer support, appointment confirmations, order updates"
    
  facebook:
    penetration: "~10M users (declining among youth)"
    usage: "Older demographics (35+), expat communities"
    marketing_fit: "Expat targeting, older Saudis"

## Cultural & Social Context

cultural_sensitivities:
  conservative_values:
    - "Modesty in imagery (especially for women in ads)"
    - "No mixed-gender socializing in ads (unless family context)"
    - "Avoid alcohol, pork, gambling imagery"
    - "Ramadan: No eating/drinking imagery during daylight hours"
    
  gender_dynamics:
    - "Women's empowerment growing (Vision 2030 focus)"
    - "Female-targeted marketing expanding (fashion, beauty, education, careers)"
    - "Women now drive, work, travel independently (post-2018 reforms)"
    - "BUT: Still conservative compared to UAE - balance modernity with tradition"
    
  national_pride:
    - "Strong national identity - Saudi National Day (Sept 23) is HUGE"
    - "Green color (Saudi flag) resonates emotionally"
    - "Arabic language preferred (vs English in UAE)"
    - "Support for local brands and 'Made in Saudi' products"

## Vision 2030 Impact on Marketing

new_sectors_emerging:
  entertainment:
    - "Cinemas opened (2018), concerts, festivals now common"
    - "Riyadh Season (Oct-March): Massive entertainment events"
    - "Marketing opportunity: Event sponsorships, experiential marketing"
    
  tourism:
    - "Tourist visas launched (2019), growing sector"
    - "AlUla, Red Sea Project, NEOM - new destinations"
    - "Marketing opportunity: Domestic + international tourism campaigns"
    
  sports:
    - "Football, F1, golf, boxing - major events hosted"
    - "Sports marketing growing (sponsorships, athlete endorsements)"
    
  tech_startups:
    - "Government support for startups, VC funding growing"
    - "Marketing opportunity: B2B SaaS, fintech, e-commerce enablers"

## Payment & Commerce Behaviors (Saudi-Specific)

payment_methods:
  credit_debit_cards:
    usage: "60-70% of online transactions"
    note: "MADA (local card network) very popular"
    
  apple_pay_stc_pay:
    usage: "30-40% (growing)"
    note: "STC Pay (telecom-backed wallet) widely used"
    
  cod_cash_on_delivery:
    usage: "20-30% (declining, but still significant)"
    
  tabby_tamara_bnpl:
    usage: "15-20% (buy now, pay later - very popular among millennials)"
    note: "Tabby and Tamara are Saudi-based BNPL leaders"

buyer_psychology_saudi:
  brand_loyalty:
    - "Once a Saudi customer trusts a brand, they stick with it"
    - "Relationship-building is CRITICAL (B2B especially)"
    
  premium_positioning:
    - "Saudis associate price with quality"
    - "Don't compete on price - emphasize quality, service, exclusivity"
    
  influencer_trust:
    - "Saudi influencers have VERY strong parasocial relationships with followers"
    - "Influencer recommendations drive purchasing decisions more than ads"
    
  family_orientation:
    - "Family is central - family meal deals, family packages work well"
    - "Marketing to women: Emphasize family benefits, not just individual"

## Seasonal Marketing Calendar (Saudi-Specific)

key_periods:
  ramadan:
    timing: "March 10 - April 8, 2026"
    significance: "50-60% of annual revenue for many businesses"
    behavior: "Evening shopping (post-iftar 8PM-midnight), family purchases"
    strategy: "Emotional storytelling, family values, charity themes"
    budget_allocation: "40-50% of annual ad spend"
    
  saudi_national_day:
    timing: "September 23"
    significance: "MASSIVE celebrations - patriotic fervor"
    strategy: "Green-themed creative, national pride messaging, Saudi flag imagery"
    budget_allocation: "10-15% of Q3 spend"
    note: "Brands that celebrate Saudi National Day build strong emotional connections"
    
  riyadh_season:
    timing: "October - March (6 months!)"
    significance: "Entertainment, concerts, events - massive footfall"
    strategy: "Event sponsorships, experiential marketing, influencer activations"
    budget_allocation: "15-20% of annual spend (if relevant industry)"
    
  eid_al_fitr:
    timing: "April 9-11, 2026"
    significance: "Gift-giving, fashion, gold jewelry"
    strategy: "Premium positioning, gift sets, family-oriented"
    
  eid_al_adha:
    timing: "June 15-18, 2026"
    significance: "Qurbani (sacrifice), family gatherings, travel"
    strategy: "Family meals, travel packages, home goods"

## Channel Strategy (Saudi-Specific Prioritization)

recommended_channel_prioritization:
  tier_1_must_have:
    - "Snapchat Ads (75% daily use - CRITICAL)"
    - "Instagram Ads (premium positioning)"
    - "WhatsApp Business (customer communication)"
    - "Influencer marketing (trust-building)"
    
  tier_2_growth:
    - "Twitter/X (real-time, trending topics)"
    - "Google Search Ads (intent-based)"
    - "YouTube Ads (video content)"
    
  tier_3_scale:
    - "TikTok Ads (if targeting Gen Z)"
    - "Out-of-home (Riyadh, Jeddah highways)"
    - "Event sponsorships (Riyadh Season, concerts)"

avoid_low_roi:
  - "Facebook Ads (declining youth engagement, use for expats 35+ only)"
  - "LinkedIn Ads (unless B2B enterprise)"

