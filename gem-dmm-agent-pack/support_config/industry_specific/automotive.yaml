## Egypt/GCC Adjustments for Automotive

regional_nuances:
  egypt:
    - "Financing critical: 70% of new car purchases are financed. Highlight monthly payment, not total price."
    - "WhatsApp mandatory: Customers expect to inquire via WhatsApp. Respond within 1 hour."
    - "Used car dominance: 80% of market is used cars (affordability). Focus here unless premium brand."
    - "Trust barriers: High scam concerns. Show vehicle history, offer inspection reports."
    - "Price negotiation expected: Egyptians negotiate heavily. Build margin into pricing."
    - "Seasonal spike: Eid and summer (June-August) are peak buying seasons."
    
  gcc:
    - "Premium segment strong: GCC buyers prefer luxury brands (Mercedes, BMW, Lexus)."
    - "Cash purchases common: 40-50% pay cash (vs 70% financing in Egypt)."
    - "Brand loyalty high: Once a customer buys a brand, they often stick with it."
    - "Service expectations: Premium service (valet, loaner cars) expected."
    - "Influencer reviews: GCC buyers trust automotive influencers heavily (YouTube, Instagram)."
    - "Ramadan slowdown: Car sales drop during Ramadan (focus on services, post-Ramadan campaigns)."

## Seasonal Campaign Playbook

high_impact_periods:
  year_end_clearance:
    timing: "December"
    significance: "Dealerships clear inventory for new model year"
    strategy: "Heavy discounts, 0% financing, trade-in bonuses"
    budget_allocation: "25-30% of annual ad spend"
    
  summer_season_egypt:
    timing: "June-August"
    significance: "Peak buying season (vacations, weddings)"
    strategy: "Family car focus, road trip messaging, financing offers"
    
  eid_campaigns_gcc:
    timing: "Post-Ramadan (April), Post-Hajj (June)"
    significance: "Gift purchases, family upgrades"
    strategy: "Luxury positioning, family-oriented creative"
    
  back_to_school:
    timing: "September"
    significance: "Parents buy cars for university students"
    strategy: "Affordable, reliable cars. Safety features highlighted."

## Success Metrics & Benchmarks

key_metrics:
  - metric: "Cost Per Lead (CPL)"
    benchmark_new_cars: "$50-200"
    benchmark_used_cars: "$30-100"
    benchmark_services: "$10-30"
    
  - metric: "Lead-to-Sale Conversion"
    benchmark_new_cars: "5-15%"
    benchmark_used_cars: "10-25%"
    
  - metric: "Cost Per Sale"
    benchmark_new_cars: "$500-$2K"
    benchmark_used_cars: "$200-$800"
    
  - metric: "Test Drive Conversion"
    benchmark: "30-50% (test drive to sale)"
    
  - metric: "Customer Lifetime Value"
    includes: "Initial sale + services + future purchases + referrals"
    benchmark: "$5K-$50K (depending on segment)"

kill_criteria:
  - "If CPL > $300 for new cars → Channel not working, reassess targeting"
  - "If test drive conversion < 20% → Sales process issue, not marketing"
  - "If service retention < 30% → Customer experience problem"

## Anti-Patterns for Automotive Marketing

common_mistakes:
  - mistake: "Stock photos instead of actual inventory"
    fix: "Show real cars available NOW. Include VIN, mileage, price."
  
  - mistake: "Hiding the price ('Call for price')"
    fix: "Transparency builds trust. Show starting price or range."
  
  - mistake: "No financing information"
    fix: "Lead with monthly payment. 'From $299/month' more compelling than '$18K total'"
  
  - mistake: "Ignoring WhatsApp (Egypt/GCC)"
    fix: "Add click-to-WhatsApp buttons on ads. Respond within 1 hour."
  
  - mistake: "No follow-up after test drive"
    fix: "Automated SMS/WhatsApp: 'Thanks for visiting! Here's your personalized offer.'"
  
  - mistake: "Generic ads (no specific model/offer)"
    fix: "Feature specific cars with specific offers. '2026 Camry - $2K off this week only'"

## Automotive-Specific Tactics

high_impact_strategies:
  virtual_showroom:
    description: "360° photos, video walkarounds, live video tours via WhatsApp"
    roi: "Reduces showroom visits by 30%, but increases qualified leads"
    
  trade_in_calculator:
    description: "Online tool to estimate trade-in value"
    roi: "Increases lead quality (serious buyers only)"
    
  financing_pre_approval:
    description: "Online application, instant approval"
    roi: "Removes biggest barrier to purchase"
    
  service_reminders:
    description: "Automated WhatsApp/SMS for oil changes, inspections"
    roi: "30-50% increase in service retention"
    
  referral_program:
    description: "Reward customers for referring friends ($500-$1K incentive)"
    roi: "Lowest CAC channel (referred customers 5x more likely to buy)"
