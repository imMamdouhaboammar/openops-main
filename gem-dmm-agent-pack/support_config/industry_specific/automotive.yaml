# Automotive Industry Marketing Configuration
# Car dealerships, auto services, parts retailers, ride-sharing platforms

industry: automotive
last_updated: "2026-02-15"
source_verification: "Based on 2026 automotive marketing benchmarks"

## Industry Characteristics

business_model:
  segments:
    new_car_sales: "High-ticket ($15K-$100K+), long consideration (30-90 days)"
    used_car_sales: "Medium-ticket ($5K-$30K), faster decision (7-30 days)"
    auto_services: "Low-ticket ($50-$500), recurring need"
    parts_accessories: "Low-ticket ($20-$500), impulse + planned purchases"
  
  sales_cycle:
    new_cars: "60-90 days (research-heavy)"
    used_cars: "14-30 days"
    services: "Same-day to 7 days"
  
  trust_sensitivity: "HIGH - major purchase, concerns about quality, scams"

buyer_psychology:
  primary_concerns:
    new_cars:
      - "Financing options (monthly payment more important than total price)"
      - "Reliability and warranty"
      - "Resale value"
      - "Features vs price tradeoff"
    
    used_cars:
      - "Vehicle history (accidents, maintenance)"
      - "Is this a fair price?"
      - "Will it break down?"
      - "Can I trust this seller?"
    
    services:
      - "Is this mechanic trustworthy?"
      - "Am I being overcharged?"
      - "How long will it take?"
  
  decision_triggers:
    - "Test drive (critical for new/used cars)"
    - "Financing approval (removes barrier)"
    - "Limited-time offers (end of month, year-end clearance)"
    - "Social proof (reviews, recommendations)"

## Channel Strategy Patterns

recommended_channels:
  tier_1_essential_new_used_cars:
    - channel: "Facebook & Instagram Ads"
      rationale: "Visual showcase of vehicles. Retargeting critical (long consideration)."
      expected_timeline: "Week 1 for leads, 30-90 days for sales"
      typical_cost: "$2-8 CPC, $50-200 cost per lead, $500-2K cost per sale"
      creative_notes: "High-quality photos, video walkarounds, 360° views"
      
    - channel: "Google Search Ads (Intent-Based)"
      rationale: "Capture bottom-funnel searches ('Toyota Camry 2026 price', 'used cars near me')"
      expected_timeline: "Immediate leads"
      typical_cost: "$1-5 CPC, $30-150 cost per lead"
      
    - channel: "YouTube Ads (Video Reviews)"
      rationale: "Buyers watch reviews before purchasing. Pre-roll ads on automotive content."
      expected_timeline: "2-4 weeks"
      typical_cost: "$0.05-$0.30 per view"
  
  tier_1_essential_services_parts:
    - channel: "Google Local Ads (Maps)"
      rationale: "'Auto repair near me' searches. Critical for local services."
      expected_timeline: "Immediate"
      typical_cost: "$2-10 CPC"
      
    - channel: "Facebook Local Awareness Ads"
      rationale: "Target people within 5-10km radius"
      expected_timeline: "Week 1"
      typical_cost: "$0.50-$3 CPC"
  
  tier_2_growth:
    - channel: "WhatsApp Business (Egypt/GCC)"
      rationale: "Appointment booking, price inquiries, service reminders"
      expected_timeline: "Immediate"
      typical_cost: "Free"
      regional_note: "CRITICAL in Egypt/GCC - customers expect WhatsApp communication"
      
    - channel: "Influencer Partnerships (Car Reviewers)"
      rationale: "Automotive influencers have engaged audiences. Reviews drive showroom visits."
      expected_timeline: "1-2 months"
      typical_cost: "$500-$5K per review (depending on influencer size)"
      
    - channel: "Retargeting (Meta + Google Display)"
      rationale: "Buyers visit 5-10 times before purchase. Stay top-of-mind."
      expected_timeline: "Immediate"
      typical_cost: "$0.50-$3 CPM"
  
  tier_3_scale:
    - channel: "Out-of-Home (Billboards)"
      rationale: "Brand awareness for dealerships. High visibility in GCC (Dubai, Riyadh highways)."
      expected_timeline: "Ongoing (monthly contracts)"
      typical_cost: "$2K-$20K/month (location-dependent)"
      
    - channel: "Radio Ads (Commuter Targeting)"
      rationale: "Reach drivers during commute. Works in Egypt/GCC."
      expected_timeline: "Immediate"
      typical_cost: "$500-$5K per campaign"

avoid_or_deprioritize:
  - channel: "LinkedIn Ads"
    reason: "Unless B2B (fleet sales to corporations)"
  - channel: "TikTok"
    reason: "Younger audience may not have purchasing power for cars (yet)"

## Touchpoint Architecture for Automotive

buyer_journey_mapping:
  stage_1_awareness_new_cars:
    touchpoints: ["Instagram feed ads", "YouTube reviews", "Billboards"]
    goal: "Create desire for specific model/brand"
    
  stage_2_consideration:
    touchpoints: ["Comparison pages", "Influencer reviews", "Dealership website"]
    goal: "Shortlist 2-3 options"
    
  stage_3_evaluation:
    touchpoints: ["Test drive", "Financing calculator", "Trade-in appraisal"]
    goal: "Experience the car, understand affordability"
    
  stage_4_conversion:
    touchpoints: ["Sales call", "Financing approval", "Limited-time offer"]
    goal: "Close the sale"
    
  stage_5_retention_services:
    touchpoints: ["Service reminders (WhatsApp, SMS)", "Loyalty programs", "Referral incentives"]
    goal: "Bring customer back for maintenance, future purchases"

