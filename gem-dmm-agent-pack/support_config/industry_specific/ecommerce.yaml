## Egypt/GCC Adjustments for E-commerce

regional_nuances:
  egypt:
    - "COD is MANDATORY: 70-80% of e-commerce transactions are COD. Credit card penetration ~10%."
    - "Shipping concerns: Unreliable postal service. Use trusted couriers (Bosta, Aramex). Offer free shipping for AOV > EGP 500."
    - "WhatsApp for support: Customers expect to confirm orders via WhatsApp. Add click-to-WhatsApp buttons."
    - "Ramadan shopping surge: 40% of annual sales in Ramadan month. Plan campaigns 2 months ahead."
    - "Fawry payment: Second most popular after COD. Integrate Fawry for online payments."
  
  gcc:
    - "Credit cards more common: 60-70% online payments via credit/debit cards."
    - "Premium positioning works: Higher AOV tolerance. Don't compete on price alone—emphasize quality."
    - "Snapchat dominance (Saudi): 75% of Saudi youth use Snapchat daily. Critical channel for fashion, beauty."
    - "Next-day delivery expected: Logistics are advanced. Free next-day delivery is competitive advantage."
    - "Influencer culture strong: GCC consumers trust influencers more than traditional ads. Invest heavily."

## Success Metrics & Benchmarks

key_metrics:
  - metric: "ROAS (Return on Ad Spend)"
    benchmark: "3:1 minimum (break-even), 5:1+ healthy"
    
  - metric: "CAC (Customer Acquisition Cost)"
    benchmark: "$10-50 (mass market), $50-150 (premium)"
    
  - metric: "Cart Abandonment Rate"
    benchmark: "60-80% (industry avg), optimize to < 60%"
    
  - metric: "Average Order Value (AOV)"
    optimization: "Upsell, bundles, free shipping thresholds"
    
  - metric: "Repeat Purchase Rate"
    benchmark: "20-40% within 90 days (consumables), 10-20% (durables)"
    
  - metric: "Customer Lifetime Value (LTV)"
    target: "LTV:CAC > 3:1"

kill_criteria:
  - "If ROAS < 2:1 after 4 weeks → Pause channel, reassess creative/targeting"
  - "If cart abandonment > 85% → Checkout UX issue, not marketing"
  - "If repeat purchase rate < 5% after 6 months → Product-market fit or quality issue"

## Anti-Patterns for E-commerce Marketing

common_mistakes:
  - mistake: "Generic product pages with stock photos only"
    fix: "Add UGC (customer photos), video demos, detailed descriptions with benefits"
  
  - mistake: "No abandoned cart recovery"
    fix: "Implement email + SMS sequences (3-email flow minimum)"
  
  - mistake: "Ignoring mobile optimization"
    fix: "70% of e-commerce traffic is mobile. Optimize checkout for mobile first."
  
  - mistake: "Running ads without retargeting pixel"
    fix: "Install Meta Pixel + Google Tag BEFORE launching ads. Retargeting = 30-50% of sales."
  
  - mistake: "Not offering COD in Egypt"
    fix: "YOU WILL FAIL. COD is non-negotiable for Egyptian e-commerce."

## Seasonal Campaign Playbook

high_impact_periods:
  - event: "Ramadan (Egypt/GCC)"
    timing: "March-April 2026"
    strategy: "Heavy discounts, family bundles, late-night shopping (post-iftar). Pause ads during day (low engagement)."
    budget_allocation: "30-40% of annual ad spend"
    
  - event: "Black Friday / White Friday (GCC rebranding)"
    timing: "November"
    strategy: "Flash sales, countdown timers, influencer partnerships. Start teasing 2 weeks before."
    budget_allocation: "20-30% of Q4 ad spend"
    
  - event: "Back to School (Egypt)"
    timing: "September"
    strategy: "Target parents (age 30-45) with uniforms, stationery, electronics."
    budget_allocation: "10-15% of Q3 spend"
