## Egypt/GCC Adjustments for Charities

regional_nuances:
  egypt:
    - "Zakat & Sadaqah: Religious obligation drives 60-70% of donations. Peak during Ramadan."
    - "Ramadan = 70-80% of annual donations: Plan entire year around Ramadan campaign."
    - "WhatsApp critical: Donors want direct communication. Share impact updates via WhatsApp."
    - "Bank transfer preferred: Credit card penetration low. Provide bank account details prominently."
    - "Fawry integration: Second most popular payment method after bank transfer."
    - "Celebrity endorsements: Egyptian celebrities (actors, singers) drive massive awareness."
    - "Transparency concerns: Show exactly where money goes (build schools, feed families). Egyptians skeptical of overhead."
  
  gcc:
    - "Zakat calculation tools: Provide online Zakat calculators (especially during Ramadan)."
    - "High-net-worth donors: GCC has many wealthy individuals. Cultivate major donor relationships."
    - "Corporate CSR: Large corporations have CSR budgets. Target with formal proposals."
    - "Ramadan campaigns: 60-70% of annual donations. Premium creative, emotional storytelling."
    - "Payment flexibility: Credit cards common, but also bank transfer, Apple Pay."
    - "Influencer culture: GCC influencers (especially Saudi) can drive significant donations."
    - "Naming rights: Major donors expect recognition (name on building, program, etc.)."
    - "Government approvals: Some GCC countries require government approval for fundraising. Check regulations."

## Seasonal Campaign Playbook

high_impact_periods:
  ramadan:
    timing: "March 10 - April 8, 2026"
    significance: "70-80% of annual donations (Egypt/GCC)"
    strategy: "Launch 2 weeks before Ramadan. Daily impact stories. Matching campaigns. Zakat calculator."
    creative_themes: "Family, community, helping those in need, breaking fast together"
    budget_allocation: "60-70% of annual marketing budget"
    
  eid_al_fitr:
    timing: "April 9-11, 2026"
    significance: "Sadaqah (charity) tradition during Eid"
    strategy: "Final push for Ramadan campaign. Thank donors. Show impact achieved."
    
  eid_al_adha:
    timing: "June 15-18, 2026"
    significance: "Qurbani (animal sacrifice) + charity"
    strategy: "Qurbani programs (donate meat to poor). Livestock campaigns."
    
  year_end_giving:
    timing: "December (global), varies by fiscal year"
    significance: "Tax deductions drive year-end donations (Western donors)"
    strategy: "Tax-deductible messaging. Matching campaigns. Impact reports."
    
  crisis_response:
    timing: "As needed (natural disasters, conflicts)"
    significance: "Urgency drives immediate donations"
    strategy: "Rapid response ads. SMS blasts. WhatsApp updates. Show real-time impact."

## Success Metrics & Benchmarks

key_metrics:
  - metric: "Cost Per Donor Acquisition"
    benchmark: "$5-30 (digital), $50-200 (events)"
    
  - metric: "Donor Retention Rate"
    benchmark: "40-50% year-over-year (healthy)"
    target: "> 60% (excellent)"
    
  - metric: "Recurring Donor Conversion"
    benchmark: "10-20% of one-time donors convert to recurring"
    
  - metric: "Average Donation Size"
    benchmark: "$50-150 (individual), $1K-10K (corporate)"
    
  - metric: "Email Open Rate (Donor List)"
    benchmark: "25-35% (higher than commercial)"
    
  - metric: "Donation Page Conversion Rate"
    benchmark: "15-30% (visitors who donate)"
    
  - metric: "Lifetime Value (Recurring Donor)"
    benchmark: "10-20x first donation"

kill_criteria:
  - "If cost per donor > average donation → Unsustainable, reassess channel"
  - "If donor retention < 30% → Lack of engagement/impact communication"
  - "If Ramadan campaign < 50% of annual donations (Egypt/GCC) → Missed opportunity, plan better next year"

## Anti-Patterns for Charity Marketing

common_mistakes:
  - mistake: "Guilt-tripping or negative imagery (starving children, suffering)"
    fix: "Show hope and impact. 'Your donation WILL help' vs 'Look at this suffering'"
  
  - mistake: "Vague impact ('help people')"
    fix: "Specific impact: '$50 feeds a family for a month', '$100 builds a well'"
  
  - mistake: "No transparency on fund usage"
    fix: "Show pie chart: 85% programs, 10% fundraising, 5% admin (example)"
  
  - mistake: "Ignoring Ramadan (Egypt/GCC)"
    fix: "Plan entire year around Ramadan. 70% of donations happen in 30 days."
  
  - mistake: "One-time donor focus only"
    fix: "Nurture for recurring donations. Monthly giving = predictable revenue."
  
  - mistake: "Complicated donation process"
    fix: "One-click donation. Multiple payment options. Mobile-optimized."
  
  - mistake: "No donor appreciation"
    fix: "Thank immediately (email, SMS, WhatsApp). Share impact updates. Recognize publicly (if they consent)."

## Compliance & Best Practices

legal_requirements:
  egypt:
    - "Register with Ministry of Social Solidarity"
    - "Annual financial reporting required"
    - "Foreign funding restrictions (check regulations)"
  
  gcc:
    - "Saudi: Register with Ministry of Human Resources and Social Development"
    - "UAE: Obtain fundraising permit from relevant authority"
    - "Some countries restrict online fundraising - verify before launching"

transparency_standards:
  - "Publish annual reports (financials + impact)"
  - "Show overhead percentage (aim for < 15% admin/fundraising)"
  - "Third-party audits (builds trust)"
  - "Impact metrics (lives changed, families fed, schools built)"

## Donor Personas

typical_donor_segments:
  religious_donors:
    motivation: "Zakat, Sadaqah (religious obligation)"
    timing: "Ramadan, Eid"
    messaging: "Fulfill your religious duty. Purify your wealth."
    
  empathy_driven:
    motivation: "Emotional connection to cause"
    timing: "Crisis response, compelling stories"
    messaging: "You can change a life today. Here's how."
    
  impact_focused:
    motivation: "Measurable results"
    timing: "Year-round (data-driven)"
    messaging: "Your $50 provides clean water for 10 families. Proven impact."
    
  social_recognition:
    motivation: "Public acknowledgment"
    timing: "Galas, major campaigns"
    messaging: "Join our circle of champions. Be recognized for your generosity."
    
  corporate_csr:
    motivation: "Brand reputation, employee engagement"
    timing: "Fiscal year planning"
    messaging: "Partner with us for meaningful CSR. Engage your employees in giving back."
