## Egypt/GCC Adjustments for SaaS

regional_nuances:
  egypt:
    - "Payment challenge: International SaaS subscriptions require credit cards (low penetration). Consider local payment gateways (Fawry, Paymob)."
    - "Localization: Arabic UI optional but helpful for non-technical users."
    - "Support expectations: Live chat (WhatsApp preferred) is critical. Self-serve docs insufficient."
  
  gcc:
    - "Enterprise focus: GCC SaaS buyers prioritize vendor relationships. Human touchpoints (in-person demos, account management) critical."
    - "Security concerns: Data residency requirements in Saudi (PDPL). Mention compliance early."
    - "Payment: Credit cards more common, but net-30/60 payment terms expected for B2B."

## Success Metrics & Benchmarks

key_metrics:
  - metric: "CAC (Customer Acquisition Cost)"
    benchmark_smb: "$200-800"
    benchmark_mid_market: "$1K-5K"
    benchmark_enterprise: "$10K-50K+"
    
  - metric: "Trial-to-Paid Conversion"
    benchmark: "10-25% (varies by product complexity)"
    
  - metric: "Time to First Value"
    target: "< 7 days (reduce to increase conversion)"
    
  - metric: "MQL-to-SQL Conversion"
    benchmark: "15-30% (B2B SaaS)"
    
  - metric: "LTV:CAC Ratio"
    healthy: "> 3:1"
    excellent: "> 5:1"

kill_criteria:
  - "If CAC exceeds 50% of ACV after 3 months → Pause and reassess channel mix"
  - "If trial-to-paid < 5% after optimization → Product-market fit issue, not just marketing"
  - "If sales cycle > 12 months for mid-market → Likely targeting wrong segment"

## Anti-Patterns for SaaS Marketing

common_mistakes:
  - mistake: "Building features instead of proving ROI"
    fix: "Lead with outcome (save time, increase revenue), not features list"
  
  - mistake: "Over-reliance on paid ads without content foundation"
    fix: "Invest in SEO + content FIRST. Paid ads amplify, don't replace organic."
  
  - mistake: "No clear ICP → Targeting 'everyone'"
    fix: "Narrow to specific vertical or company size. Expand later."
  
  - mistake: "Long, complex trials with no onboarding"
    fix: "Reduce trial friction. Add automated onboarding emails, in-app guidance."
