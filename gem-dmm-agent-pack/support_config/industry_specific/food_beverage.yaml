## Egypt/GCC Adjustments for F&B

regional_nuances:
  egypt:
    - "Talabat dominance: 60% of food delivery market. MUST be on Talabat."
    - "Price sensitivity: Egyptians compare prices heavily. Offer value meals, combos."
    - "WhatsApp for reservations: Customers prefer WhatsApp over phone calls."
    - "Ramadan iftar rush: 40% of monthly revenue in Ramadan (6PM-8PM surge)."
    - "Cash on delivery: 80% of delivery orders are COD."
    - "Instagram discovery: Young Egyptians discover new restaurants via Instagram (food bloggers)."
    - "Hygiene concerns: Show clean kitchen, food prep (builds trust)."
    
  gcc:
    - "Premium positioning: GCC customers willing to pay for quality and experience."
    - "Delivery apps competitive: Talabat, Deliveroo, Uber Eats all strong. Be on multiple."
    - "Influencer culture: Food influencers in Dubai/Riyadh drive massive foot traffic."
    - "Instagram-worthy spaces: GCC customers want 'grammable' interiors. Invest in aesthetics."
    - "Ramadan timing: Iftar buffets, suhoor specials (midnight dining)."
    - "Expat vs local: Different cuisines for different segments (Arabic for locals, international for expats)."
    - "Fast delivery expected: 30-45 minutes max. Longer = bad reviews."

## Seasonal Campaign Playbook

high_impact_periods:
  ramadan:
    timing: "March 10 - April 8, 2026"
    significance: "40-50% of monthly revenue (iftar rush 6-8PM)"
    strategy: "Iftar buffets, family meals, suhoor specials (midnight dining). Heavy Instagram ads."
    creative_themes: "Family togetherness, breaking fast, traditional foods"
    budget_allocation: "35-45% of annual marketing budget"
    
  eid_celebrations:
    timing: "April 9-11 (Eid al-Fitr), June 15-18 (Eid al-Adha)"
    significance: "Family gatherings, dining out"
    strategy: "Family meal deals, reservations push, catering packages"
    
  summer_season:
    timing: "June-August"
    significance: "Outdoor dining, late-night crowds (GCC)"
    strategy: "Outdoor seating promotions, cold beverages, summer menu"
    
  valentines_day:
    timing: "February 14"
    significance: "Couples dining (GCC more than Egypt)"
    strategy: "Romantic ambiance, couple deals, reservations required"
    
  new_years_eve:
    timing: "December 31"
    significance: "Celebrations, parties"
    strategy: "Special menus, reservations, premium pricing"

## Success Metrics & Benchmarks

key_metrics:
  - metric: "Cost Per Customer Acquisition"
    benchmark: "$5-20 (digital), $50-200 (influencer campaign)"
    
  - metric: "Customer Retention Rate"
    benchmark: "30-50% monthly (dine-in), 20-40% (delivery)"
    
  - metric: "Average Order Value (AOV)"
    benchmark_dine_in: "$15-50 per person"
    benchmark_delivery: "$20-40 per order"
    
  - metric: "Delivery App Rating"
    target: "> 4.5 stars (critical for visibility)"
    
  - metric: "Instagram Engagement Rate"
    benchmark: "3-8% (F&B performs well)"
    
  - metric: "Repeat Customer Rate"
    benchmark: "40-60% within 30 days (healthy)"

kill_criteria:
  - "If delivery app rating < 4.0 → Fix food quality/service BEFORE spending on ads"
  - "If CAC > AOV → Unsustainable, reassess channel mix"
  - "If repeat rate < 20% → Product/experience issue, not marketing"

## Anti-Patterns for F&B Marketing

common_mistakes:
  - mistake: "Poor food photography (dark, unappetizing)"
    fix: "Invest in professional food photography. Natural light, styled dishes."
  
  - mistake: "Ignoring Google My Business"
    fix: "FREE traffic. Update hours, menu, photos weekly. Respond to reviews."
  
  - mistake: "No user-generated content (UGC)"
    fix: "Encourage customers to tag you. Repost their photos. Run photo contests."
  
  - mistake: "Slow delivery times"
    fix: "Optimize kitchen operations. 30-45 min max. Late = bad reviews = death."
  
  - mistake: "No loyalty program"
    fix: "Repeat customers = 60% of revenue. Simple punch card or SMS program works."
  
  - mistake: "Ignoring Ramadan (Egypt/GCC)"
    fix: "40% of monthly revenue. Plan iftar/suhoor menus 2 months ahead."
  
  - mistake: "Not responding to negative reviews"
    fix: "Respond within 24 hours. Apologize, offer to make it right. Shows you care."

