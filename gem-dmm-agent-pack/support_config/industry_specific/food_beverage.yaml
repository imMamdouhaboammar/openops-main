# Food & Beverage / Restaurants Marketing Configuration
# Restaurants, cafes, cloud kitchens, food delivery, catering

industry: food_beverage_restaurants
last_updated: "2026-02-15"
source_verification: "Based on 2026 F&B marketing benchmarks"

## Industry Characteristics

business_model:
  segments:
    dine_in_restaurants: "Experience-driven, repeat customers, local catchment"
    quick_service_qsr: "Fast, affordable, high volume"
    cloud_kitchens: "Delivery-only, no dine-in, lower overhead"
    cafes_coffee_shops: "Social space, repeat visits, loyalty-driven"
    catering: "Event-based, B2B + B2C, high-ticket orders"
  
  typical_transaction:
    dine_in: "$10-$50 per person"
    delivery: "$15-$40 per order"
    catering: "$500-$5K+ per event"
  
  repeat_frequency:
    coffee_shops: "Daily to weekly"
    restaurants: "Weekly to monthly"
    catering: "Occasional (events)"

buyer_psychology:
  primary_motivations:
    - "Convenience (location, delivery speed)"
    - "Taste and quality (reviews, photos critical)"
    - "Ambiance and experience (Instagram-worthy)"
    - "Value for money (portion size, pricing)"
  
  decision_triggers:
    - "Hunger (immediate need)"
    - "Social occasion (date, family gathering)"
    - "Visual appeal (food photos on Instagram)"
    - "Promotions (discounts, BOGO, free delivery)"
  
  trust_factors:
    - "Reviews and ratings (Google, Zomato, Talabat)"
    - "Food photos (user-generated content)"
    - "Hygiene and cleanliness"
    - "Consistency (same quality every visit)"

## Channel Strategy Patterns

recommended_channels:
  tier_1_essential:
    - channel: "Instagram (Visual Storytelling)"
      rationale: "Food is HIGHLY visual. Instagram = #1 platform for F&B discovery."
      expected_timeline: "Week 1 for awareness, ongoing for engagement"
      typical_cost: "$1-4 CPC, $5-20 cost per customer"
      creative_notes: "High-quality food photos, behind-the-scenes, user-generated content"
      
    - channel: "Google My Business (Local SEO)"
      rationale: "'Restaurants near me' searches. FREE and critical for local discovery."
      expected_timeline: "Immediate (once optimized)"
      typical_cost: "FREE"
      critical_note: "MUST optimize: photos, hours, menu, reviews"
      
    - channel: "Food Delivery Apps (Talabat, Uber Eats, Deliveroo)"
      rationale: "40-60% of F&B revenue is delivery (Egypt/GCC). Must be present."
      expected_timeline: "Immediate"
      typical_cost: "20-30% commission per order"
      regional_note: "Talabat dominates Egypt/GCC"
  
  tier_2_growth:
    - channel: "Facebook Ads (Local Awareness)"
      rationale: "Target people within 3-5km radius. Drive foot traffic."
      expected_timeline: "Week 1"
      typical_cost: "$0.50-$3 CPC"
      
    - channel: "Influencer Marketing (Food Bloggers)"
      rationale: "Food influencers drive massive awareness + foot traffic."
      expected_timeline: "1-2 weeks per campaign"
      typical_cost: "Micro: $100-500, Macro: $1K-5K per post/visit"
      roi_note: "One viral post can drive 100+ customers in a week"
      
    - channel: "TikTok (Viral Food Content)"
      rationale: "Food content performs exceptionally well on TikTok. Young audience."
      expected_timeline: "1-2 weeks"
      typical_cost: "$0.50-$2 CPC, but organic reach possible"
      
    - channel: "WhatsApp Business (Reservations, Catering Inquiries)"
      rationale: "Direct communication for bookings, catering quotes"
      expected_timeline: "Immediate"
      typical_cost: "FREE"
      regional_note: "CRITICAL in Egypt/GCC"
  
  tier_3_scale:
    - channel: "Loyalty Programs (SMS, App)"
      rationale: "Repeat customers = 60-70% of revenue. Reward loyalty."
      expected_timeline: "2-3 months to build"
      typical_cost: "$100-500/month (app/SMS platform)"
      
    - channel: "Email Marketing (Promotions, Events)"
      rationale: "Announce new menu items, special events, offers"
      expected_timeline: "Immediate (once list built)"
      typical_cost: "Low ($50-200/month)"

avoid_or_deprioritize:
  - channel: "LinkedIn Ads"
    reason: "Unless B2B catering for corporate events"
  - channel: "Long-form content (blogs, whitepapers)"
    reason: "F&B is visual and experiential, not educational"

## Touchpoint Architecture for F&B

buyer_journey_mapping:
  stage_1_discovery:
    touchpoints: ["Instagram posts", "Google Maps search", "Influencer recommendations"]
    goal: "Create awareness and desire"
    
  stage_2_consideration:
    touchpoints: ["Menu browsing", "Reviews (Google, Talabat)", "Food photos"]
    goal: "Validate choice (taste, value, hygiene)"
    
  stage_3_conversion:
    touchpoints: ["Delivery app order", "Reservation (WhatsApp, phone)", "Walk-in"]
    goal: "Complete transaction"
    
  stage_4_retention:
    touchpoints: ["Loyalty program", "SMS promotions", "Instagram engagement"]
    goal: "Drive repeat visits"

