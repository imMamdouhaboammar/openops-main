independence_groups:
  google_official:
    description: "Google's official documentation ecosystem"
    sources: ["google_search_central", "google_ads_help", "ga4_documentation", "gtm_documentation", "search_console_docs"]
  
  meta_official:
    description: "Meta's official documentation"
    sources: ["meta_business_help"]
  
  tiktok_official:
    description: "TikTok's official documentation"
    sources: ["tiktok_business_help"]
  
  microsoft_official:
    description: "Microsoft's official documentation"
    sources: ["linkedin_marketing_docs", "microsoft_ads_docs"]
  
  analytics_vendors:
    description: "Third-party analytics vendors"
    sources: ["mixpanel_docs", "amplitude_docs", "posthog_docs"]
  
  research_outlets:
    description: "Independent research organizations"
    sources: ["statista", "emarketer", "gartner_marketing", "forrester_marketing", "mckinsey_marketing"]
  
  practitioner_sites:
    description: "Marketing practitioner blogs and publications"
    sources: ["moz_blog", "ahrefs_blog", "semrush_blog", "unbounce_blog", "optimeo_blog"]
  
  github_community:
    description: "Open-source community repositories"
    sources: ["github_analytics", "github_experimentation", "github_attribution"]
  
  reddit_community:
    description: "Reddit discussion forums (WEAK EVIDENCE ONLY)"
    sources: ["reddit_marketing", "reddit_ppc", "reddit_seo"]

confirmation_rules:
  minimum_independent_sources: 3
  independence_requirement: |
    For a key recommendation, confirmations must come from DIFFERENT independence_groups.
    Multiple pages from the same source or organization do NOT count as independent.
  
  reddit_never_counts: |
    Reddit sources can NEVER be one of the 3 required confirmations.
    They may only be used as supporting qualitative context.
  
  recency_enforcement_2026: |
    Platform feature claims MUST be verified against sources updated Q4 2025 or later.
    Benchmark data MUST include 2026 context or be explicitly marked as "dated".
    Regional insights (Egypt/GCC) require 2025+ verification.
    Algorithm changes require 2026 verification.
  
  example_valid_confirmations:
    scenario: "Google Ads Performance Max best practices"
    valid_combination:
      - source: "google_ads_help" (google_official)
      - source: "think_with_google" (google_research)
      - source: "semrush_blog" (semrush_practitioner)
    note: "Three different independence groups = valid"
    
  example_invalid_confirmations:
    scenario: "Google Ads Performance Max best practices"
    invalid_combination:
      - source: "google_ads_help" (google_official)
      - source: "ga4_documentation" (google_official)
      - source: "think_with_google" (google_research)
    reason: "All from Google ecosystem = only 1 independent source"
