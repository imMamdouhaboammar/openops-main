# ═══════════════════════════════════════════════════════════════════════════════
# 2026 RECENCY REQUIREMENTS
# ═══════════════════════════════════════════════════════════════════════════════
recency_requirements:
  platform_features:
    requirement: "MUST verify against sources updated Q4 2025 or later"
    rationale: "Platform features change rapidly (new ad formats, targeting options, etc.)"
    examples:
      - "Google Ads Performance Max capabilities"
      - "Meta Advantage+ Shopping features"
      - "TikTok Shop integration"
    
  benchmarks_and_costs:
    requirement: "MUST include 2026 context OR mark as 'dated'"
    rationale: "CPCs, CPMs, conversion rates change with market conditions"
    examples:
      - "Facebook Ads CPC benchmarks"
      - "E-commerce conversion rate averages"
      - "Email open rate benchmarks"
    acceptable_approach: "Use 2024-2025 data but add disclaimer: 'Based on 2024 data; verify current rates'"
    
  regional_insights:
    requirement: "Egypt/GCC insights require 2025+ verification"
    rationale: "Regional markets evolve rapidly (new platforms, payment methods, regulations)"
    examples:
      - "Snapchat usage in Saudi Arabia"
      - "WhatsApp Business adoption in Egypt"
      - "Ramadan shopping behavior"
    
  algorithm_changes:
    requirement: "Google/Meta/TikTok algorithm claims require 2026 verification"
    rationale: "Search and social algorithms update frequently"
    examples:
      - "Google ranking factors"
      - "Meta ad delivery optimization"
      - "TikTok For You algorithm"
    
  timeless_principles:
    requirement: "No recency requirement"
    rationale: "Fundamental marketing principles don't change"
    examples:
      - "Customer journey stages (awareness → consideration → conversion)"
      - "A/B testing statistical significance calculations"
      - "Attribution modeling concepts (first-touch, last-touch, multi-touch)"
      - "Funnel optimization principles"

verification_timestamps:
  last_platform_verification: "2026-02-15"
  next_review_due: "2026-05-15"
  critical_sources_to_monitor:
    - "Google Ads Help (weekly review for major feature launches)"
    - "Meta Business Help (weekly review for Advantage+ updates)"
    - "TikTok Business Help (monthly review for TikTok Shop changes)"
    - "Think with Google (quarterly review for consumer insights)"
    - "Regional sources (monthly for Egypt/GCC market changes)"
