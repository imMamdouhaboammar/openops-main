# gem-dmm-agent-pack/config/grounding_sources.yaml
# Pack Version: 1.0.0 | Last Updated: 2026-02-15
#
# Purpose: Source registry + trust tiers + independence groups.
#
# 🔴 2026 VERIFICATION REQUIREMENTS:
# - Platform feature claims MUST be verified against sources updated Q4 2025 or later
# - Benchmark data MUST include 2026 context or be marked as "dated"
# - Regional insights (Egypt/GCC) require 2025+ verification
# - Algorithm changes (Google, Meta, TikTok) require 2026 verification
#
# Trust tiers:
# - A: Primary/official docs or standards bodies
# - B: Reputable research/outlets or major vendors
# - C: Practitioner sources (credible but may be biased)
# - D: Community/qualitative (weak evidence; never sufficient alone)
#
# Independence groups:
# - Used to enforce "≥3 independent confirmations" for key recommendations.

# ═══════════════════════════════════════════════════════════════════════════════
# 2026 PLATFORM CHANGES CONTEXT
# ═══════════════════════════════════════════════════════════════════════════════
# Critical platform updates that affect recommendations:
#
# Google Ads (2026):
# - Performance Max now dominant campaign type (70%+ of spend for e-commerce)
# - Broad match + Smart Bidding is new default (exact match declining)
# - Consent Mode v2 required for EU/EEA (affects conversion tracking)
#
# Meta Ads (2026):
# - Advantage+ Shopping campaigns standard for e-commerce
# - iOS 14.5+ privacy changes stabilized (modeled conversions standard)
# - Reels ads now 40% of Instagram ad inventory
#
# TikTok Ads (2026):
# - TikTok Shop integrated into ads platform (social commerce)
# - Spark Ads (organic content boosting) now 30% of ad formats
# - Creator Marketplace integrated for influencer campaigns
#
# GA4 (2026):
# - Universal Analytics fully sunset (July 2023, data access ended 2024)
# - GA4 is ONLY Google Analytics option
# - BigQuery export standard (free tier available)
#
# Regional (Egypt/GCC 2026):
# - Snapchat dominance in Saudi Arabia (75% daily use)
# - WhatsApp Business API critical for customer communication
# - Ramadan 2026: March 10 - April 8 (40-70% of annual revenue for many sectors)
# ═══════════════════════════════════════════════════════════════════════════════

