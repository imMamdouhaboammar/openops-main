# Egyptian Dialect Writer - Content Generation Workflow
# سير عمل توليد المحتوى

version: "1.0.0"
name: "Content Generation Workflow"
description: "Complete workflow for generating Egyptian dialect content"

stages:
  # ==========================================
  # STAGE 1: Input Processing & Analysis
  # ==========================================
  - stage: "input_processing"
    order: 1
    description: "معالجة وتحليل المدخلات"
    
    steps:
      - step: "receive_input"
        agent: null
        action: "capture_user_request"
        output:
          - topic
          - content_type
          - target_platform
          - length_preference
          - special_requirements

      - step: "context_analysis"
        agent: "context_analyzer"
        action: "analyze_context_deeply"
        input_from: "receive_input"
        output:
          - topic_classification
          - audience_profile
          - intent_detection
          - platform_requirements
          - contextual_recommendations

      - step: "research_gathering"
        agent: "research_module"
        action: "gather_relevant_information"
        parallel: true
        sources:
          - recent_news
          - industry_reports
          - trending_topics
          - factual_data
        output:
          - research_data
          - verified_facts
          - relevant_examples

  # ==========================================
  # STAGE 2: Content Planning
  # ==========================================
  - stage: "content_planning"
    order: 2
    description: "تخطيط هيكل ومحتوى المادة"
    
    steps:
      - step: "tone_selection"
        agent: "tone_master"
        action: "select_appropriate_tone"
        input_from:
          - context_analysis
          - audience_profile
        output:
          - primary_tone_profile
          - emotional_targets
          - voice_characteristics

      - step: "structure_design"
        agent: "structure_architect"
        action: "design_content_structure"
        input_from:
          - context_analysis
          - platform_requirements
        output:
          - content_outline
          - section_breakdown
          - optimal_length
          - formatting_guidelines

      - step: "key_points_identification"
        agent: "creativity_engine"
        action: "identify_key_messages"
        input_from:
          - research_data
          - intent_detection
        output:
          - main_points
          - supporting_arguments
          - potential_examples

  # ==========================================
  # STAGE 3: Content Generation
  # ==========================================
  - stage: "content_generation"
    order: 3
    description: "توليد المحتوى الفعلي"
    
    steps:
      - step: "draft_generation"
        agent: "language_model"
        action: "generate_initial_draft"
        input_from:
          - content_outline
          - primary_tone_profile
          - main_points
          - research_data
        parameters:
          temperature: 0.7
          top_p: 0.9
          max_length: "based_on_requirements"
        output:
          - raw_draft

      - step: "lexicon_mixing"
        agent: "lexicon_mixer"
        action: "apply_natural_mixing"
        input_from: "raw_draft"
        output:
          - mixed_content
          - term_balance_report

      - step: "creativity_enhancement"
        agent: "creativity_engine"
        action: "enhance_with_creativity"
        input_from: "mixed_content"
        enhancements:
          - add_examples
          - craft_rhetorical_questions
          - inject_metaphors
          - add_humor_where_appropriate
        output:
          - enhanced_draft

      - step: "tone_application"
        agent: "tone_master"
        action: "apply_consistent_tone"
        input_from: "enhanced_draft"
        output:
          - toned_content

  # ==========================================
  # STAGE 4: Quality Assurance
  # ==========================================
  - stage: "quality_assurance"
    order: 4
    description: "فحص وضمان الجودة"
    
    steps:
      - step: "comprehensive_check"
        agent: "quality_checker"
        action: "run_full_quality_check"
        input_from: "toned_content"
        layers:
          - linguistic
          - lexical
          - structural
          - tonal
          - factual
          - cultural
        output:
          - quality_report
          - issue_list
          - overall_score
          - auto_corrections

      - step: "apply_corrections"
        agent: "quality_checker"
        action: "apply_auto_corrections"
        input_from:
          - toned_content
          - auto_corrections
        output:
          - corrected_content

      - step: "decision_point"
        action: "evaluate_quality_score"
        conditions:
          - if: "quality_score >= 0.85"
            then: "proceed_to_humanization"
          - if: "quality_score >= 0.75 and < 0.85"
            then: "apply_improvements_then_proceed"
          - if: "quality_score < 0.75"
            then: "regenerate_from_stage_3"

  # ==========================================
  # STAGE 5: Humanization
  # ==========================================
  - stage: "humanization"
    order: 5
    description: "إضافة اللمسات البشرية الطبيعية"
    
    steps:
      - step: "human_touches"
        agent: "human_mimicker"
        action: "add_human_naturalness"
        input_from: "corrected_content"
        techniques:
          - natural_imperfections
          - thinking_patterns
          - conversational_naturalness
          - emotional_authenticity
          - style_variation
        output:
          - humanized_content

      - step: "anti_ai_optimization"
        agent: "human_mimicker"
        action: "optimize_for_human_likeness"
        input_from: "humanized_content"
        strategies:
          - increase_perplexity
          - inject_burstiness
          - contextual_unpredictability
        output:
          - final_content

  # ==========================================
  # STAGE 6: Final Validation & Output
  # ==========================================
  - stage: "final_output"
    order: 6
    description: "التحقق النهائي والإخراج"
    
    steps:
      - step: "final_review"
        agent: "quality_checker"
        action: "quick_final_check"
        input_from: "final_content"
        output:
          - validation_status
          - final_score

      - step: "format_for_platform"
        action: "apply_platform_formatting"
        input_from:
          - final_content
          - platform_requirements
        output:
          - formatted_content

      - step: "generate_metadata"
        action: "create_content_metadata"
        output:
          - creation_timestamp
          - quality_scores
          - agents_used
          - processing_time
          - version_info

      - step: "deliver_output"
        action: "return_to_user"
        output:
          - formatted_content
          - metadata
          - quality_report
          - suggestions_for_improvement

# ==========================================
# Error Handling & Fallbacks
# ==========================================
error_handling:
  retry_policy:
    max_retries: 3
    backoff_strategy: "exponential"
  
  fallback_actions:
    - condition: "quality_below_threshold"
      action: "regenerate_with_adjusted_parameters"
    
    - condition: "agent_failure"
      action: "use_backup_agent"
    
    - condition: "timeout"
      action: "simplify_requirements_and_retry"

# ==========================================
# Performance Monitoring
# ==========================================
monitoring:
  track_metrics:
    - stage_duration
    - agent_performance
    - quality_scores
    - retry_count
    - user_satisfaction
  
  optimization_triggers:
    - slow_performance
    - low_quality_scores
    - high_retry_rates

# ==========================================
# Continuous Learning
# ==========================================
learning:
  collect_feedback:
    - user_ratings
    - engagement_metrics
    - edit_patterns
  
  update_models:
    frequency: "weekly"
    based_on: "accumulated_feedback"
