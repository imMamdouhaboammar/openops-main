# Egyptian Dialect Writer - Quality Assurance Workflow
# سير عمل ضمان الجودة

version: "1.0.0"
name: "Quality Assurance Workflow"
description: "Comprehensive QA process for Egyptian dialect content"

workflow_type: "validation_and_improvement"
trigger: "content_draft_completed"

# ==========================================
# QA LAYERS
# ==========================================
qa_layers:
  
  # Layer 1: Linguistic Quality
  - layer: "linguistic_quality"
    priority: "critical"
    checks:
      - check: "grammar_validation"
        rules:
          - subject_verb_agreement
          - pronoun_consistency
          - proper_conjugation
        auto_fix: true
        
      - check: "spelling_accuracy"
        exceptions:
          - intentional_colloquial_spelling
        auto_fix: true
        
      - check: "punctuation_consistency"
        rules:
          - appropriate_question_marks
          - balanced_exclamations
          - proper_comma_usage
        auto_fix: true

  # Layer 2: Lexical Balance
  - layer: "lexical_balance"
    priority: "high"
    checks:
      - check: "code_switching_ratio"
        target_ranges:
          english_technical: [0.30, 0.40]
          egyptian_colloquial: [0.40, 0.50]
          arabized_terms: [0.15, 0.25]
        action_if_violated: "recommend_adjustments"
        
      - check: "term_consistency"
        rules:
          - same_term_same_spelling
          - no_variant_switching
        severity: "high"
        
      - check: "colloquial_authenticity"
        validate_against: "egyptian_lexicon"
        flag:
          - unnatural_phrasing
          - forced_slang
          - formal_intrusion

  # Layer 3: Structural Integrity
  - layer: "structural_integrity"
    priority: "high"
    checks:
      - check: "hook_effectiveness"
        criteria:
          attention_grabbing: ">= 0.7"
          topic_relevant: true
          not_clickbait: true
        
      - check: "logical_flow"
        validate:
          - smooth_transitions
          - coherent_progression
          - clear_connections
        
      - check: "paragraph_optimization"
        rules:
          max_lines: 4
          prefer_short: true
          white_space_adequate: true
        
      - check: "cta_presence"
        required: true
        quality_check: "engaging_and_clear"

  # Layer 4: Tonal Consistency
  - layer: "tonal_consistency"
    priority: "high"
    checks:
      - check: "tone_variance"
        max_variance: 0.15
        measure: "across_paragraphs"
        
      - check: "persona_alignment"
        verify_against: "tone_master_profile"
        characteristics:
          - confident_knowledgeable
          - friendly_direct
          - appropriately_analytical
        
      - check: "emotional_appropriateness"
        flag:
          - excessive_enthusiasm
          - inappropriate_sarcasm
          - forced_humor

  # Layer 5: Factual Accuracy
  - layer: "factual_accuracy"
    priority: "critical"
    checks:
      - check: "fact_verification"
        validate:
          - numbers_and_statistics
          - company_names
          - dates_and_timelines
          - claims_and_statements
        sources:
          - research_module
          - knowledge_base
          - external_apis
        
      - check: "logical_consistency"
        detect:
          - contradictory_statements
          - impossible_claims
          - circular_logic
        
      - check: "source_attribution"
        require: "for_statistics"
        prevent: "made_up_numbers"

  # Layer 6: Cultural Sensitivity
  - layer: "cultural_sensitivity"
    priority: "medium"
    checks:
      - check: "cultural_appropriateness"
        flag:
          - offensive_content
          - insensitive_jokes
          - inappropriate_references
        
      - check: "local_context_fit"
        verify:
          - egyptian_cultural_alignment
          - regional_relevance
          - audience_understanding

# ==========================================
# SCORING SYSTEM
# ==========================================
scoring:
  overall_quality_score:
    calculation: "weighted_average"
    weights:
      linguistic_quality: 0.20
      lexical_balance: 0.20
      structural_integrity: 0.20
      tonal_consistency: 0.15
      factual_accuracy: 0.15
      cultural_sensitivity: 0.10
    
    thresholds:
      exceptional: [0.90, 1.00]
      excellent: [0.85, 0.89]
      good: [0.75, 0.84]
      needs_work: [0.60, 0.74]
      poor: [0.00, 0.59]
    
    minimum_pass: 0.75
    target_score: 0.85

  dimension_scores:
    - dimension: "naturalness"
      target: 0.90
      measurement: "human_likeness"
    
    - dimension: "engagement"
      target: 0.85
      measurement: "predicted_interaction"
    
    - dimension: "accuracy"
      target: 0.95
      measurement: "factual_correctness"
    
    - dimension: "consistency"
      target: 0.90
      measurement: "internal_coherence"

# ==========================================
# DECISION RULES
# ==========================================
decision_rules:
  - condition: "score >= 0.85"
    action: "approve_immediately"
    next_stage: "humanization"
  
  - condition: "score >= 0.75 and score < 0.85"
    action: "approve_with_recommendations"
    provide: "improvement_suggestions"
    next_stage: "humanization"
  
  - condition: "score < 0.75"
    action: "request_revision"
    return_to: "content_generation_stage"
    with: "detailed_feedback"

# ==========================================
# AUTO-CORRECTION
# ==========================================
auto_correction:
  enabled: true
  
  can_auto_fix:
    - spelling_errors
    - minor_grammar_issues
    - punctuation_inconsistencies
    - formatting_problems
  
  requires_human_review:
    - factual_inaccuracies
    - logical_inconsistencies
    - major_tone_shifts
    - structural_reorganization
  
  suggestion_system:
    provide_alternatives: true
    explain_reasoning: true
    priority_ranking: true

# ==========================================
# FEEDBACK GENERATION
# ==========================================
feedback_report:
  structure:
    executive_summary:
      - overall_score
      - pass_fail_status
      - top_3_strengths
      - top_3_issues
    
    detailed_analysis:
      - layer_by_layer_scores
      - specific_issues_found
      - corrections_applied
      - improvement_suggestions
    
    recommendations:
      - immediate_actions
      - long_term_improvements
      - learning_points

# ==========================================
# CONTINUOUS IMPROVEMENT
# ==========================================
continuous_improvement:
  learn_from:
    - flagged_errors
    - correction_patterns
    - user_feedback
    - engagement_data
  
  update_frequency: "weekly"
  
  optimization_areas:
    - rule_refinement
    - threshold_adjustment
    - detection_accuracy
    - suggestion_quality
